<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" width="1920" height="600">
  <defs>
    <radialGradient id="rg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1a17"/>
      <stop offset="100%" stop-color="#0a0a08"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
    </pattern>
    <pattern id="grid2" width="300" height="300" patternUnits="userSpaceOnUse">
      <path d="M 300 0 L 0 0 0 300" fill="none" stroke="#c0392b" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1920" height="600" fill="url(#rg)"/>
  <rect width="1920" height="600" fill="url(#grid)"/>
  <rect width="1920" height="600" fill="url(#grid2)"/>

  <!-- Corner markers -->
  <g stroke="#c0392b" stroke-width="1" fill="none" opacity="0.3">
    <line x1="40" y1="20" x2="40" y2="60"/>
    <line x1="20" y1="40" x2="60" y2="40"/>
    <line x1="1880" y1="20" x2="1880" y2="60"/>
    <line x1="1860" y1="40" x2="1900" y2="40"/>
    <line x1="40" y1="540" x2="40" y2="580"/>
    <line x1="20" y1="560" x2="60" y2="560"/>
    <line x1="1880" y1="540" x2="1880" y2="580"/>
    <line x1="1860" y1="560" x2="1900" y2="560"/>
  </g>

  <!-- Center crosshair -->
  <g stroke="#c0392b" stroke-width="0.5" fill="none" opacity="0.15">
    <circle cx="960" cy="300" r="80"/>
    <circle cx="960" cy="300" r="160"/>
    <line x1="880" y1="300" x2="800" y2="300"/>
    <line x1="1040" y1="300" x2="1120" y2="300"/>
    <line x1="960" y1="220" x2="960" y2="140"/>
    <line x1="960" y1="380" x2="960" y2="460"/>
  </g>

  <!-- Watermark text -->
  <text x="960" y="320" text-anchor="middle" font-family="'Bebas Neue','Impact',sans-serif" font-size="180" letter-spacing="30" fill="#ffffff" opacity="0.02">BADLAND</text>
</svg>
