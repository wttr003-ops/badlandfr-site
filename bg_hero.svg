<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="sky" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a0a08"/>
      <stop offset="60%" stop-color="#0d0d0b"/>
      <stop offset="100%" stop-color="#050504"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c0392b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c0392b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4ac0d" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d4ac0d" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur4"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Red glow horizon -->
  <ellipse cx="960" cy="680" rx="900" ry="300" fill="url(#glow1)" filter="url(#blur8)"/>
  <!-- Gold glow -->
  <ellipse cx="960" cy="560" rx="500" ry="180" fill="url(#glow2)" filter="url(#blur8)"/>

  <!-- Stars -->
  <g opacity="0.6">
    <circle cx="120" cy="80" r="1" fill="#fff" opacity="0.8"/>
    <circle cx="340" cy="45" r="1.5" fill="#fff" opacity="0.6"/>
    <circle cx="580" cy="120" r="1" fill="#fff" opacity="0.9"/>
    <circle cx="780" cy="60" r="1" fill="#fff" opacity="0.5"/>
    <circle cx="1050" cy="90" r="1.5" fill="#fff" opacity="0.7"/>
    <circle cx="1280" cy="40" r="1" fill="#fff" opacity="0.8"/>
    <circle cx="1450" cy="110" r="1" fill="#fff" opacity="0.6"/>
    <circle cx="1680" cy="70" r="1.5" fill="#fff" opacity="0.9"/>
    <circle cx="1820" cy="50" r="1" fill="#fff" opacity="0.5"/>
    <circle cx="200" cy="160" r="1" fill="#fff" opacity="0.4"/>
    <circle cx="460" cy="200" r="1" fill="#fff" opacity="0.7"/>
    <circle cx="900" cy="140" r="1.5" fill="#fff" opacity="0.6"/>
    <circle cx="1160" cy="180" r="1" fill="#fff" opacity="0.5"/>
    <circle cx="1560" cy="150" r="1" fill="#fff" opacity="0.8"/>
    <circle cx="1750" cy="200" r="1.5" fill="#fff" opacity="0.4"/>
  </g>

  <!-- Distant mountains -->
  <polygon points="0,580 180,360 320,420 480,300 620,380 750,280 880,350 1000,260 1150,340 1300,250 1450,320 1580,230 1720,310 1920,220 1920,600 0,600" fill="#0f0f0d" opacity="0.9"/>

  <!-- Mid mountains -->
  <polygon points="0,680 150,500 280,560 420,460 580,530 720,430 900,510 1080,400 1250,490 1420,380 1600,470 1780,370 1920,440 1920,700 0,700" fill="#141410" opacity="0.95"/>

  <!-- Foreground hills -->
  <polygon points="0,820 200,700 380,740 560,680 740,730 920,660 1100,720 1280,650 1480,710 1660,640 1840,700 1920,680 1920,1080 0,1080" fill="#0a0a08"/>

  <!-- Ruins silhouettes left -->
  <g fill="#0d0d0b">
    <!-- Ruined building left -->
    <rect x="60" y="620" width="80" height="180"/>
    <rect x="50" y="600" width="20" height="40"/>
    <rect x="110" y="590" width="15" height="50"/>
    <rect x="70" y="580" width="30" height="25"/>
    <!-- Windows dark -->
    <rect x="75" y="640" width="15" height="20" fill="#1a0a08" opacity="0.8"/>
    <rect x="105" y="650" width="15" height="20" fill="#1a0a08" opacity="0.8"/>
    <rect x="75" y="680" width="15" height="20" fill="#c0392b" opacity="0.1"/>
  </g>

  <!-- Ruins silhouettes right -->
  <g fill="#0d0d0b">
    <rect x="1760" y="580" width="100" height="220"/>
    <rect x="1840" y="560" width="25" height="60"/>
    <rect x="1770" y="550" width="18" height="45"/>
    <rect x="1780" y="600" width="15" height="20" fill="#c0392b" opacity="0.08"/>
    <rect x="1810" y="615" width="15" height="20" fill="#1a0a08" opacity="0.8"/>
  </g>

  <!-- Dead trees silhouettes -->
  <g stroke="#0f0f0d" stroke-width="2" fill="none" opacity="0.8">
    <!-- Tree 1 -->
    <line x1="1400" y1="750" x2="1400" y2="560"/>
    <line x1="1400" y1="620" x2="1360" y2="580"/>
    <line x1="1400" y1="640" x2="1440" y2="600"/>
    <line x1="1400" y1="600" x2="1370" y2="555"/>
    <line x1="1360" y1="580" x2="1340" y2="560"/>
    <line x1="1440" y1="600" x2="1460" y2="575"/>
    <!-- Tree 2 -->
    <line x1="500" y1="780" x2="500" y2="600"/>
    <line x1="500" y1="650" x2="465" y2="615"/>
    <line x1="500" y1="670" x2="535" y2="635"/>
    <line x1="500" y1="635" x2="478" y2="608"/>
  </g>

  <!-- Watchtower silhouette -->
  <g fill="#0c0c0a">
    <rect x="1550" y="500" width="8" height="280"/>
    <rect x="1620" y="500" width="8" height="280"/>
    <rect x="1540" y="490" width="100" height="50"/>
    <rect x="1530" y="480" width="120" height="15"/>
    <rect x="1555" y="540" width="70" height="4"/>
    <rect x="1555" y="600" width="70" height="4"/>
    <rect x="1555" y="660" width="70" height="4"/>
  </g>

  <!-- Barbed wire line -->
  <g stroke="#1a1a15" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M0,820 Q100,810 200,820 Q300,830 400,818 Q500,808 600,820 Q700,832 800,818 Q900,806 1000,820 Q1100,834 1200,820 Q1300,808 1400,820 Q1500,832 1600,820 Q1700,810 1800,820 Q1860,826 1920,818"/>
    <!-- Barbs -->
    <line x1="150" y1="820" x2="155" y2="812"/>
    <line x1="150" y1="820" x2="145" y2="812"/>
    <line x1="350" y1="822" x2="355" y2="814"/>
    <line x1="350" y1="822" x2="345" y2="814"/>
    <line x1="600" y1="820" x2="605" y2="812"/>
    <line x1="600" y1="820" x2="595" y2="812"/>
    <line x1="900" y1="820" x2="905" y2="812"/>
    <line x1="900" y1="820" x2="895" y2="812"/>
    <line x1="1200" y1="820" x2="1205" y2="812"/>
    <line x1="1200" y1="820" x2="1195" y2="812"/>
    <line x1="1500" y1="820" x2="1505" y2="812"/>
    <line x1="1500" y1="820" x2="1495" y2="812"/>
    <line x1="1750" y1="820" x2="1755" y2="812"/>
    <line x1="1750" y1="820" x2="1745" y2="812"/>
  </g>

  <!-- Smoke/fog foreground -->
  <ellipse cx="300" cy="900" rx="400" ry="120" fill="#0a0a08" opacity="0.6" filter="url(#blur8)"/>
  <ellipse cx="1600" cy="920" rx="450" ry="130" fill="#0a0a08" opacity="0.5" filter="url(#blur8)"/>
  <ellipse cx="960" cy="1000" rx="700" ry="150" fill="#0a0a08" opacity="0.7" filter="url(#blur8)"/>

  <!-- Red embers / distant fire glow -->
  <circle cx="1550" cy="700" r="3" fill="#c0392b" opacity="0.6" filter="url(#blur2)"/>
  <circle cx="1548" cy="698" r="8" fill="#c0392b" opacity="0.15" filter="url(#blur4)"/>
  <circle cx="380" cy="720" r="2" fill="#d4ac0d" opacity="0.4" filter="url(#blur2)"/>
  <circle cx="378" cy="718" r="6" fill="#d4ac0d" opacity="0.1" filter="url(#blur4)"/>

  <!-- Logo text overlay -->
  <text x="960" y="460" text-anchor="middle" font-family="'Bebas Neue', 'Impact', sans-serif" font-size="140" letter-spacing="20" fill="#fff" opacity="0.03">BADLAND FR</text>

  <!-- Vignette overlay -->
  <defs>
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#vig)"/>

  <!-- Red scanline tint at bottom -->
  <rect x="0" y="900" width="1920" height="180" fill="#c0392b" opacity="0.03"/>
</svg>
